<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamMapper</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

h1,h2{
    margin-top:0;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

.save-btn{
    background:#4CAF50;
    color:white;
}

.dream{
    border-left:4px solid #4CAF50;
    padding-left:10px;
    margin-bottom:15px;
}

.stat{
    margin-bottom:8px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <h1>🌙 DreamMapper</h1>

    <div class="card">
        <h2>Add Dream</h2>

        <input id="title" placeholder="Dream Title">

        <textarea id="description"
        rows="5"
        placeholder="Describe your dream..."></textarea>

        <select id="emotion">
            <option>Happy</option>
            <option>Sad</option>
            <option>Fear</option>
            <option>Anxiety</option>
            <option>Excitement</option>
            <option>Anger</option>
        </select>

        <button class="save-btn" onclick="saveDream()">
            Save Dream
        </button>
    </div>

    <div class="card">
        <h2>Statistics</h2>

        <div class="stat" id="totalDreams">
            Total Dreams: 0
        </div>

        <div class="stat" id="commonEmotion">
            Most Common Emotion: None
        </div>
    </div>

    <div class="card">
        <h2>Dream History</h2>

        <div id="dreamList"></div>
    </div>

</div>

<script>

let dreams =
JSON.parse(localStorage.getItem("dreams")) || [];

function saveDream(){

    const title =
    document.getElementById("title").value;

    const description =
    document.getElementById("description").value;

    const emotion =
    document.getElementById("emotion").value;

    if(title.trim()==="" || description.trim()===""){
        alert("Please enter a title and description.");
        return;
    }

    const dream = {
        title,
        description,
        emotion,
        date:new Date().toLocaleDateString()
    };

    dreams.push(dream);

    localStorage.setItem(
        "dreams",
        JSON.stringify(dreams)
    );

    document.getElementById("title").value="";
    document.getElementById("description").value="";

    renderDreams();
}

function renderDreams(){

    const dreamList =
    document.getElementById("dreamList");

    dreamList.innerHTML="";

    dreams.slice().reverse().forEach(dream => {

        dreamList.innerHTML += `
        <div class="dream">
            <h3>${dream.title}</h3>
            <p>${dream.description}</p>
            <strong>Emotion:</strong> ${dream.emotion}<br>
            <small>${dream.date}</small>
        </div>
        `;
    });

    updateStats();
}

function updateStats(){

    document.getElementById("totalDreams")
    .innerText =
    "Total Dreams: " + dreams.length;

    let counts = {};

    dreams.forEach(dream => {
        counts[dream.emotion] =
        (counts[dream.emotion] || 0) + 1;
    });

    let commonEmotion = "None";
    let highest = 0;

    for(let emotion in counts){

        if(counts[emotion] > highest){

            highest = counts[emotion];
            commonEmotion = emotion;
        }
    }

    document.getElementById("commonEmotion")
    .innerText =
    "Most Common Emotion: " + commonEmotion;
}

renderDreams();

</script>

</body>
                    </html>
