<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamMapper</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

h1,h2{
    margin-top:0;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    margin-right:5px;
}

.save-btn{
    background:#4CAF50;
    color:white;
}

.save-btn:hover{
    background:#45a049;
}

.voice-btn{
    background:#2196F3;
    color:white;
}

.voice-btn:hover{
    background:#0b7dda;
}

.voice-btn.recording{
    background:#f44336;
    animation: pulse 0.5s infinite;
}

.summary-btn{
    background:#9C27B0;
    color:white;
    padding:8px 12px;
    font-size:14px;
    margin-top:10px;
}

.summary-btn:hover{
    background:#7b1fa2;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.7; }
    100% { opacity: 1; }
}

.button-group{
    display:flex;
    gap:5px;
}

.dream{
    border-left:4px solid #4CAF50;
    padding-left:10px;
    margin-bottom:15px;
}

.dream-summary{
    background:#f0f4ff;
    border-left:4px solid #9C27B0;
    padding:10px;
    margin-top:10px;
    border-radius:4px;
    font-style:italic;
    color:#333;
}

.stat{
    margin-bottom:8px;
    font-weight:bold;
}

.status-message{
    margin-top:10px;
    padding:10px;
    border-radius:6px;
    display:none;
}

.status-message.success{
    background:#d4edda;
    color:#155724;
    border:1px solid #c3e6cb;
    display:block;
}

.status-message.error{
    background:#f8d7da;
    color:#721c24;
    border:1px solid #f5c6cb;
    display:block;
}
</style>
</head>

<body>

<div class="container">

    <h1>🌙 DreamMapper</h1>

    <div class="card">
        <h2>Add Dream</h2>

        <input id="title" placeholder="Dream Title">

        <textarea id="description"
        rows="5"
        placeholder="Describe your dream..."></textarea>

        <select id="emotion">
            <option>Happy</option>
            <option>Sad</option>
            <option>Fear</option>
            <option>Anxiety</option>
            <option>Excitement</option>
            <option>Anger</option>
        </select>

        <div class="button-group">
            <button class="save-btn" onclick="saveDream()">
                Save Dream
            </button>
            <button class="voice-btn" id="voiceBtn" onclick="toggleVoiceRecording()">
                🎤 Record Dream
            </button>
        </div>

        <div class="status-message" id="statusMessage"></div>
    </div>

    <div class="card">
        <h2>Statistics</h2>

        <div class="stat" id="totalDreams">
            Total Dreams: 0
        </div>

        <div class="stat" id="commonEmotion">
            Most Common Emotion: None
        </div>
    </div>

    <div class="card">
        <h2>Dream History</h2>

        <div id="dreamList"></div>
    </div>

</div>

<script>

let dreams =
JSON.parse(localStorage.getItem("dreams")) || [];

let recognition;
let isRecording = false;

// Initialize Speech Recognition
if (window.SpeechRecognition || window.webkitSpeechRecognition) {
    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        isRecording = true;
        document.getElementById("voiceBtn").classList.add("recording");
        document.getElementById("voiceBtn").textContent = "🎤 Recording...";
        showStatus("Listening... speak your dream now", "");
    };

    recognition.onend = () => {
        isRecording = false;
        document.getElementById("voiceBtn").classList.remove("recording");
        document.getElementById("voiceBtn").textContent = "🎤 Record Dream";
    };

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        
        // Try to extract title and emotion from speech
        const dreamData = parseVoiceInput(transcript);
        
        document.getElementById("title").value = dreamData.title;
        document.getElementById("description").value = dreamData.description;
        document.getElementById("emotion").value = dreamData.emotion;
        
        showStatus("Dream captured! Feel free to edit and save.", "success");
    };

    recognition.onerror = (event) => {
        showStatus("Error: " + event.error, "error");
    };
} else {
    document.getElementById("voiceBtn").style.display = "none";
}

function toggleVoiceRecording() {
    if (!recognition) {
        showStatus("Speech recognition not supported in your browser", "error");
        return;
    }

    if (isRecording) {
        recognition.stop();
    } else {
        recognition.start();
    }
}

function parseVoiceInput(transcript) {
    // Simple parsing logic - can be enhanced based on needs
    const words = transcript.split(" ");
    
    // Check if transcript contains emotion keywords
    let emotion = "Happy"; // default
    const emotions = ["happy", "sad", "fear", "anxiety", "excitement", "anger"];
    
    for (let word of words) {
        for (let emo of emotions) {
            if (word.toLowerCase().includes(emo)) {
                emotion = emo.charAt(0).toUpperCase() + emo.slice(1);
                break;
            }
        }
    }

    return {
        title: transcript.split(".")[0].substring(0, 50) || "Voice Dream",
        description: transcript,
        emotion: emotion
    };
}

function showStatus(message, type) {
    const statusEl = document.getElementById("statusMessage");
    statusEl.textContent = message;
    statusEl.className = "status-message";
    if (type) {
        statusEl.classList.add(type);
    }
    
    // Auto-hide after 3 seconds
    setTimeout(() => {
        statusEl.className = "status-message";
    }, 3000);
}

function saveDream(){

    const title =
    document.getElementById("title").value;

    const description =
    document.getElementById("description").value;

    const emotion =
    document.getElementById("emotion").value;

    if(title.trim()==="" || description.trim()===""){
        showStatus("Please enter a title and description.", "error");
        return;
    }

    const dream = {
        title,
        description,
        emotion,
        date:new Date().toLocaleDateString()
    };

    dreams.push(dream);

    localStorage.setItem(
        "dreams",
        JSON.stringify(dreams)
    );

    document.getElementById("title").value="";
    document.getElementById("description").value="";

    showStatus("Dream saved successfully!", "success");
    renderDreams();
}

function extractThemes(text) {
    // Extract themes from dream description
    const themesMap = {
        "school": ["school", "class", "exam", "teacher", "student", "study"],
        "chase": ["chase", "chasing", "run", "running", "escape", "pursuing"],
        "water": ["water", "ocean", "sea", "river", "lake", "swimming", "drowning"],
        "falling": ["fall", "falling", "fell", "drop", "dropping"],
        "home": ["home", "house", "room", "apartment", "building", "family", "parents"]
    };

    const lowerText = text.toLowerCase();
    const foundThemes = [];

    for (let theme in themesMap) {
        for (let keyword of themesMap[theme]) {
            if (lowerText.includes(keyword)) {
                foundThemes.push(theme);
                break;
            }
        }
    }

    return foundThemes;
}

function summarizeDream(text, themes, emotions) {
    // Rule-based "AI-style" summarizer

    let summary = "";

    // Base interpretation
    if (emotions.includes("Fear")) {
        summary += "This dream reflects anxiety or a sense of threat. ";
    }

    if (emotions.includes("Confusion")) {
        summary += "There is a feeling of uncertainty or lack of direction. ";
    }

    if (emotions.includes("Peace")) {
        summary += "The dream has a calm and stable emotional tone. ";
    }

    if (emotions.includes("Sad")) {
        summary += "This suggests emotional weight or loss. ";
    }

    if (emotions.includes("Excitement")) {
        summary += "There is high energy and positive stimulation. ";
    }

    if (emotions.includes("Happy")) {
        summary += "This reflects positive energy and contentment. ";
    }

    if (emotions.includes("Anger")) {
        summary += "This suggests tension, frustration, or suppressed feelings. ";
    }

    if (emotions.includes("Anxiety")) {
        summary += "There is underlying worry or stress present. ";
    }

    // Theme-based meaning layer
    if (themes.includes("school")) {
        summary += "It may relate to pressure, evaluation, or personal growth. ";
    }

    if (themes.includes("chase")) {
        summary += "You may be avoiding a real-life stressor or issue. ";
    }

    if (themes.includes("water")) {
        summary += "Water often reflects emotions or subconscious depth. ";
    }

    if (themes.includes("falling")) {
        summary += "This can represent loss of control or instability. ";
    }

    if (themes.includes("home")) {
        summary += "This may relate to identity, safety, or personal roots. ";
    }

    // Fallback
    if (summary === "") {
        summary = "This dream contains mixed or unclear symbolic patterns.";
    }

    return summary.trim();
}

function toggleSummary(index) {
    const summaryEl = document.getElementById(`summary-${index}`);
    if (summaryEl.style.display === "none" || summaryEl.style.display === "") {
        const dream = dreams[dreams.length - 1 - index];
        const themes = extractThemes(dream.description);
        const summary = summarizeDream(dream.description, themes, [dream.emotion]);
        summaryEl.textContent = summary;
        summaryEl.style.display = "block";
    } else {
        summaryEl.style.display = "none";
    }
}

function renderDreams(){

    const dreamList =
    document.getElementById("dreamList");

    dreamList.innerHTML="";

    dreams.slice().reverse().forEach((dream, index) => {

        dreamList.innerHTML += `
        <div class="dream">
            <h3>${dream.title}</h3>
            <p>${dream.description}</p>
            <strong>Emotion:</strong> ${dream.emotion}<br>
            <small>${dream.date}</small>
            <br>
            <button class="summary-btn" onclick="toggleSummary(${index})">
                ✨ Get AI Summary
            </button>
            <div class="dream-summary" id="summary-${index}" style="display:none;"></div>
        </div>
        `;
    });

    updateStats();
}

function updateStats(){

    document.getElementById("totalDreams")
    .innerText =
    "Total Dreams: " + dreams.length;

    let counts = {};

    dreams.forEach(dream => {
        counts[dream.emotion] =
        (counts[dream.emotion] || 0) + 1;
    });

    let commonEmotion = "None";
    let highest = 0;

    for(let emotion in counts){

        if(counts[emotion] > highest){

            highest = counts[emotion];
            commonEmotion = emotion;
        }
    }

    document.getElementById("commonEmotion")
    .innerText =
    "Most Common Emotion: " + commonEmotion;
}

renderDreams();

</script>

</body>
</html>
