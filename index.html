<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamMapper</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

h1,h2{
    margin-top:0;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    margin-right:5px;
}

.save-btn{
    background:#4CAF50;
    color:white;
}

.save-btn:hover{
    background:#45a049;
}

.voice-btn{
    background:#2196F3;
    color:white;
}

.voice-btn:hover{
    background:#0b7dda;
}

.voice-btn.recording{
    background:#f44336;
    animation: pulse 0.5s infinite;
}

.summary-btn{
    background:#9C27B0;
    color:white;
    padding:8px 12px;
    font-size:14px;
    margin-top:10px;
}

.summary-btn:hover{
    background:#7b1fa2;
}

.analysis-btn{
    background:#00897b;
    color:white;
    padding:8px 12px;
    font-size:14px;
    margin-top:5px;
    margin-right:5px;
}

.analysis-btn:hover{
    background:#00695c;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.7; }
    100% { opacity: 1; }
}

.button-group{
    display:flex;
    gap:5px;
}

.dream{
    border-left:4px solid #4CAF50;
    padding-left:10px;
    margin-bottom:15px;
}

.dream-summary{
    background:#f0f4ff;
    border-left:4px solid #9C27B0;
    padding:10px;
    margin-top:10px;
    border-radius:4px;
    font-style:italic;
    color:#333;
}

.dream-analysis{
    background:#e8f5e9;
    border-left:4px solid #00897b;
    padding:15px;
    margin-top:10px;
    border-radius:4px;
    display:none;
}

.dream-analysis.active{
    display:block;
}

.analysis-section{
    margin-bottom:15px;
}

.analysis-section h4{
    margin:5px 0;
    color:#00695c;
    font-size:13px;
}

.analysis-section p{
    margin:5px 0;
    font-size:13px;
    color:#333;
}

.emotion-flow{
    background:white;
    padding:10px;
    border-radius:4px;
    border:1px solid #80cbc4;
    font-weight:bold;
    font-size:14px;
    color:#00695c;
    text-align:center;
}

.intensity-bar{
    background:white;
    padding:10px;
    border-radius:4px;
    margin-top:5px;
}

.intensity-label{
    font-size:12px;
    color:#666;
    margin-bottom:5px;
}

.intensity-meter{
    width:100%;
    height:20px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
}

.intensity-fill{
    height:100%;
    background:linear-gradient(90deg, #4caf50, #ff9800, #f44336);
    transition: width 0.3s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    color:white;
    font-weight:bold;
}

.symbols-list{
    background:white;
    padding:10px;
    border-radius:4px;
    border:1px solid #80cbc4;
    font-size:13px;
}

.symbol-tag{
    display:inline-block;
    background:#80cbc4;
    color:#00695c;
    padding:4px 8px;
    border-radius:12px;
    margin-right:5px;
    margin-bottom:5px;
    font-size:12px;
}

.emotions-detected{
    margin-top:10px;
    margin-bottom:10px;
}

.emotion-badge{
    display:inline-block;
    padding:6px 12px;
    margin-right:8px;
    margin-bottom:8px;
    border-radius:20px;
    font-size:14px;
    font-weight:bold;
    color:white;
}

.emotion-fear{
    background:#f44336;
}

.emotion-sadness{
    background:#3f51b5;
}

.emotion-anxiety{
    background:#ff9800;
}

.emotion-excitement{
    background:#4caf50;
}

.emotion-anger{
    background:#9c27b0;
}

.emotion-peace{
    background:#2196f3;
}

.emotion-confusion{
    background:#795548;
}

.emotion-awe{
    background:#ffc107;
    color:#333;
}

.emotion-relief{
    background:#00bcd4;
}

.emotion-empowerment{
    background:#ff5722;
}

.emotion-neutral{
    background:#999;
}

.emotion-label{
    font-weight:bold;
    color:#666;
    margin-bottom:5px;
    font-size:13px;
}

.stat{
    margin-bottom:12px;
    font-weight:bold;
}

.emotion-stats{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
    margin-top:15px;
}

.emotion-stat-item{
    background:#f9f9f9;
    padding:10px;
    border-radius:6px;
    border-left:4px solid #ccc;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.emotion-stat-label{
    font-weight:bold;
    font-size:14px;
}

.emotion-stat-count{
    background:#ddd;
    padding:4px 10px;
    border-radius:12px;
    font-weight:bold;
    font-size:12px;
}

.theme-stats{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
    margin-top:15px;
}

.theme-stat-item{
    background:#f0f7f4;
    padding:12px;
    border-radius:6px;
    border-left:4px solid #4CAF50;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.theme-stat-label{
    font-weight:bold;
    font-size:14px;
    color:#2e7d32;
}

.theme-stat-count{
    background:#c8e6c9;
    color:#1b5e20;
    padding:6px 12px;
    border-radius:12px;
    font-weight:bold;
    font-size:13px;
}

.status-message{
    margin-top:10px;
    padding:10px;
    border-radius:6px;
    display:none;
}

.status-message.success{
    background:#d4edda;
    color:#155724;
    border:1px solid #c3e6cb;
    display:block;
}

.status-message.error{
    background:#f8d7da;
    color:#721c24;
    border:1px solid #f5c6cb;
    display:block;
}
</style>
</head>

<body>

<div class="container">

    <h1>🌙 DreamMapper</h1>

        <div class="card">
    <h2>Add Dream</h2>
        
        <input id="title" placeholder="Dream Title">

        <textarea id="description"
        rows="5"
        placeholder="Describe your dream..."></textarea>

        <div class="button-group">
            <button class="save-btn" onclick="saveDream()">
                Save Dream
            </button>
            <button class="voice-btn" id="voiceBtn" onclick="toggleVoiceRecording()">
                🎤 Record Dream
            </button>
        </div>

        <div class="status-message" id="statusMessage"></div>
    </div>

    <div class="card">
        <h2>📊 Statistics & Patterns</h2>

        <div class="stat" id="totalDreams">
            Total Dreams: 0
        </div>

        <div id="allEmotionStats"></div>

        <hr style="margin: 15px 0; border: none; border-top: 1px solid #ddd;">

        <div class="stat">🔄 Recurring Themes</div>
        <div id="recurringThemesStats"></div>
    </div>

    <div class="card">
        <h2>Dream History</h2>

        <div id="dreamList"></div>
    </div>

</div>

<script>

let dreams =
JSON.parse(localStorage.getItem("dreams")) || [];

let recognition;
let isRecording = false;

// Initialize Speech Recognition
if (window.SpeechRecognition || window.webkitSpeechRecognition) {
    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        isRecording = true;
        document.getElementById("voiceBtn").classList.add("recording");
        document.getElementById("voiceBtn").textContent = "🎤 Recording...";
        showStatus("Listening... speak your dream now", "");
    };

    recognition.onend = () => {
        isRecording = false;
        document.getElementById("voiceBtn").classList.remove("recording");
        document.getElementById("voiceBtn").textContent = "🎤 Record Dream";
    };

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        
        document.getElementById("title").value = transcript.split(".")[0].substring(0, 50) || "Voice Dream";
        document.getElementById("description").value = transcript;
        
        showStatus("Dream captured! Feel free to edit and save.", "success");
    };

    recognition.onerror = (event) => {
        showStatus("Error: " + event.error, "error");
    };
} else {
    document.getElementById("voiceBtn").style.display = "none";
}

function toggleVoiceRecording() {
    if (!recognition) {
        showStatus("Speech recognition not supported in your browser", "error");
        return;
    }

    if (isRecording) {
        recognition.stop();
    } else {
        recognition.start();
    }
}

function showStatus(message, type) {
    const statusEl = document.getElementById("statusMessage");
    statusEl.textContent = message;
    statusEl.className = "status-message";
    if (type) {
        statusEl.classList.add(type);
    }
    
    // Auto-hide after 3 seconds
    setTimeout(() => {
        statusEl.className = "status-message";
    }, 3000);
}

function extractEmotionTimeline(text) {
    const emotions = {
        fear: ["afraid", "scared", "terrified", "killed", "chased", "attack", "danger", "threat", "run"],
        sadness: ["sad", "crying", "loss", "dead", "lonely"],
        confusion: ["confused", "strange", "weird", "didn't understand", "bewildered", "reincarnated", "different"],
        awe: ["huge", "colossal", "massive", "gigantic", "aura", "powerful", "overwhelming"],
        relief: ["safe", "protected", "unharmed", "escaped", "calm", "relief"],
        empowerment: ["strong", "power", "controlled", "defeated", "scattered", "dominant"]
    };

    const sentences = text.toLowerCase().match(/[^.!?]+[.!?]?/g) || [];

    const timeline = sentences.map(sentence => {
        let scores = {};

        for (let [emotion, keywords] of Object.entries(emotions)) {
            scores[emotion] = 0;

            for (let word of keywords) {
                if (sentence.includes(word)) {
                    scores[emotion]++;
                }
            }
        }

        let topEmotion = Object.entries(scores).sort((a,b) => b[1]-a[1])[0];

        return {
            text: sentence.trim(),
            emotion: topEmotion[0],
            intensity: topEmotion[1]
        };
    });

    return timeline;
}

function analyzeDream(text) {
    const emotions = {
        fear: ["afraid", "scared", "terrified", "killed", "chased", "attack", "danger", "threat", "run"],
        sadness: ["sad", "crying", "loss", "dead", "lonely"],
        confusion: ["confused", "strange", "weird", "didn't", "bewildered", "reincarnated", "different", "why"],
        awe: ["huge", "colossal", "massive", "gigantic", "aura", "overwhelming", "powerful"],
        relief: ["safe", "protected", "unharmed", "escaped", "calm", "relief"],
        empowerment: ["strong", "power", "controlled", "defeated", "scattered", "dominant", "fearless"]
    };

    const sentences = text.toLowerCase().match(/[^.!?]+[.!?]?/g) || [];

    let timeline = [];
    let transitions = [];
    let previousEmotion = null;

    for (let sentence of sentences) {
        let scores = {};

        for (let [emotion, keywords] of Object.entries(emotions)) {
            scores[emotion] = 0;
            for (let word of keywords) {
                if (sentence.includes(word)) scores[emotion]++;
            }
        }

        let [topEmotion, intensity] =
            Object.entries(scores).sort((a, b) => b[1] - a[1])[0] || ["neutral", 0];

        if (intensity === 0) topEmotion = "neutral";

        timeline.push({
            text: sentence.trim(),
            emotion: topEmotion,
            intensity
        });

        if (previousEmotion && previousEmotion !== topEmotion) {
            transitions.push({
                from: previousEmotion,
                to: topEmotion
            });
        }

        previousEmotion = topEmotion;
    }

    return { timeline, transitions };
}

function extractEmotions(text) {
    const emotionKeywords = {
        fear: ["afraid", "scared", "terrified", "horror", "nightmare", "danger", "threat", "evil", "demon"],
        sadness: ["sad", "crying", "lost", "dead", "dying", "loss", "grave", "alone", "lonely"],
        anxiety: ["worried", "anxious", "stress", "panic", "nervous", "unsure", "uncertain", "confused", "trapped"],
        excitement: ["excited", "happy", "joy", "wonderful", "amazing", "fantastic", "thrilled", "exhilarated"],
        anger: ["angry", "furious", "mad", "rage", "fight", "conflict", "arguing", "aggressive"],
        peace: ["calm", "peaceful", "serene", "quiet", "content", "relaxed", "safe"],
        confusion: ["confused", "strange", "weird", "bewildered", "different"],
        awe: ["huge", "colossal", "massive", "gigantic", "aura", "powerful", "overwhelming"],
        relief: ["protected", "unharmed", "escaped"],
        empowerment: ["strong", "power", "controlled", "dominant"]
    };

    const lowerText = text.toLowerCase();
    const detected = {};

    for (let emotion in emotionKeywords) {
        let score = 0;

        for (let keyword of emotionKeywords[emotion]) {
            if (lowerText.includes(keyword)) {
                score += 1;
            }
        }

        if (score > 0) {
            detected[emotion] = score;
        }
    }

    return detected;
}

function extractThemes(text) {
    const themesMap = {
        "school": ["school", "class", "exam", "teacher", "student", "study", "university", "college"],
        "chase": ["chase", "chasing", "run", "running", "escape", "pursuing", "pursued"],
        "water": ["water", "ocean", "sea", "river", "lake", "swimming", "drowning", "swim"],
        "falling": ["fall", "falling", "fell", "drop", "dropping", "plunge"],
        "home": ["home", "house", "room", "apartment", "building", "family", "parents"]
    };

    const lowerText = text.toLowerCase();
    const foundThemes = [];

    for (let theme in themesMap) {
        for (let keyword of themesMap[theme]) {
            if (lowerText.includes(keyword)) {
                foundThemes.push(theme);
                break;
            }
        }
    }

    return foundThemes;
}

function extractSymbols(text) {
    const symbols = [
        "school", "house", "water", "fire", "chase", "chase", "fall", "death", "demon", 
        "angel", "family", "friend", "stranger", "monster", "door", "window", "road", 
        "path", "forest", "mountain", "ocean", "sky", "light", "darkness"
    ];

    const lowerText = text.toLowerCase();
    const foundSymbols = [];

    for (let symbol of symbols) {
        if (lowerText.includes(symbol) && !foundSymbols.includes(symbol)) {
            foundSymbols.push(symbol);
        }
    }

    return foundSymbols;
}

function calculateIntensity(timeline) {
    if (timeline.length === 0) return 0;
    const totalIntensity = timeline.reduce((sum, item) => sum + (item.intensity || 0), 0);
    const avgIntensity = (totalIntensity / timeline.length) * 15;
    return Math.min(100, Math.round(avgIntensity));
}

function buildEmotionFlow(transitions) {
    if (transitions.length === 0) return "Neutral dream";
    
    const emotions = new Set();
    transitions.forEach(t => {
        emotions.add(t.from);
        emotions.add(t.to);
    });

    let flow = Array.from(emotions).join(" → ");
    return flow.length > 0 ? flow : "Neutral dream";
}

function detectRecurringThemes(dreams) {
    const themeCounts = {};

    dreams.forEach(dream => {
        if (dream.themes) {
            dream.themes.forEach(theme => {
                themeCounts[theme] = (themeCounts[theme] || 0) + 1;
            });
        }
    });

    const recurringThemes = [];

    Object.entries(themeCounts).forEach(([theme, count]) => {
        if (count >= 2) {
            recurringThemes.push({
                theme,
                occurrences: count
            });
        }
    });

    recurringThemes.sort((a, b) => b.occurrences - a.occurrences);

    return recurringThemes;
}

function summarizeDream(text, themes, detectedEmotions) {
    let summary = "";

    if (detectedEmotions["fear"]) {
        summary += "This dream reflects anxiety or a sense of threat. ";
    }

    if (detectedEmotions["anxiety"]) {
        summary += "There is underlying worry or stress present. ";
    }

    if (detectedEmotions["sadness"]) {
        summary += "This suggests emotional weight or loss. ";
    }

    if (detectedEmotions["excitement"]) {
        summary += "There is high energy and positive stimulation. ";
    }

    if (detectedEmotions["peace"]) {
        summary += "The dream has a calm and stable emotional tone. ";
    }

    if (detectedEmotions["anger"]) {
        summary += "This suggests tension, frustration, or suppressed feelings. ";
    }

    if (detectedEmotions["confusion"]) {
        summary += "There are elements of uncertainty or disorientation. ";
    }

    if (detectedEmotions["awe"]) {
        summary += "Something grand or overwhelming is present. ";
    }

    if (detectedEmotions["relief"]) {
        summary += "There is a sense of release or safety. ";
    }

    if (detectedEmotions["empowerment"]) {
        summary += "This reflects feelings of strength or control. ";
    }

    if (themes.includes("school")) {
        summary += "It may relate to pressure, evaluation, or personal growth. ";
    }

    if (themes.includes("chase")) {
        summary += "You may be avoiding a real-life stressor or issue. ";
    }

    if (themes.includes("water")) {
        summary += "Water often reflects emotions or subconscious depth. ";
    }

    if (themes.includes("falling")) {
        summary += "This can represent loss of control or instability. ";
    }

    if (themes.includes("home")) {
        summary += "This may relate to identity, safety, or personal roots. ";
    }

    if (summary === "") {
        summary = "This dream contains mixed or unclear symbolic patterns.";
    }

    return summary.trim();
}

function toggleSummary(index) {
    const summaryEl = document.getElementById(`summary-${index}`);
    if (summaryEl.style.display === "none" || summaryEl.style.display === "") {
        const dream = dreams[dreams.length - 1 - index];
        const detectedEmotions = extractEmotions(dream.description);
        const themes = extractThemes(dream.description);
        const summary = summarizeDream(dream.description, themes, detectedEmotions);
        summaryEl.innerHTML = summary;
        summaryEl.style.display = "block";
    } else {
        summaryEl.style.display = "none";
    }
}

function toggleAnalysis(index) {
    const analysisEl = document.getElementById(`analysis-${index}`);
    analysisEl.classList.toggle("active");
}

function saveDream(){

    const title =
    document.getElementById("title").value;

    const description =
    document.getElementById("description").value;

    if(title.trim()==="" || description.trim()===""){
        showStatus("Please enter a title and description.", "error");
        return;
    }

    // Run advanced analysis
    const { timeline, transitions } = analyzeDream(description);
    const themes = extractThemes(description);
    const symbols = extractSymbols(description);
    const detectedEmotions = extractEmotions(description);
    const intensity = calculateIntensity(timeline);
    const emotionFlow = buildEmotionFlow(transitions);

    const dream = {
        title,
        description,
        emotions: detectedEmotions,
        themes,
        symbols,
        timeline,
        transitions,
        emotionFlow,
        intensity,
        date: new Date().toLocaleDateString()
    };

    dreams.push(dream);

    localStorage.setItem(
        "dreams",
        JSON.stringify(dreams)
    );

    document.getElementById("title").value="";
    document.getElementById("description").value="";

    showStatus("Dream saved successfully! Full analysis stored.", "success");
    renderDreams();
}

function getEmotionColor(emotion) {
    const colors = {
        "fear": "emotion-fear",
        "sadness": "emotion-sadness",
        "anxiety": "emotion-anxiety",
        "excitement": "emotion-excitement",
        "anger": "emotion-anger",
        "peace": "emotion-peace",
        "confusion": "emotion-confusion",
        "awe": "emotion-awe",
        "relief": "emotion-relief",
        "empowerment": "emotion-empowerment",
        "neutral": "emotion-neutral"
    };
    return colors[emotion] || "emotion-peace";
}

function getEmotionIcon(emotion) {
    const icons = {
        "fear": "😨",
        "sadness": "😢",
        "anxiety": "😰",
        "excitement": "🤩",
        "anger": "😠",
        "peace": "😌",
        "confusion": "😕",
        "awe": "🌟",
        "relief": "😅",
        "empowerment": "💪",
        "neutral": "😐"
    };
    return icons[emotion] || "😌";
}

function renderDreams(){

    const dreamList =
    document.getElementById("dreamList");

    dreamList.innerHTML="";

    dreams.slice().reverse().forEach((dream, index) => {

        let emotionBadges = "";
        if (dream.emotions) {
            emotionBadges += `<div class="emotion-label">🧠 Emotions Detected:</div>`;
            for (let emotion in dream.emotions) {
                const count = dream.emotions[emotion];
                emotionBadges += `<span class="emotion-badge ${getEmotionColor(emotion)}">${getEmotionIcon(emotion)} ${emotion.toUpperCase()} (${count})</span>`;
            }
        }

        // Build analysis section
        let analysisHTML = `
            <div class="dream-analysis" id="analysis-${index}">
                <div class="analysis-section">
                    <h4>📍 Themes</h4>
                    <p>${dream.themes && dream.themes.length > 0 ? dream.themes.join(", ").toUpperCase() : "No themes detected"}</p>
                </div>

                <div class="analysis-section">
                    <h4>🎭 Emotion Flow</h4>
                    <div class="emotion-flow">${dream.emotionFlow || "Loading..."}</div>
                </div>

                <div class="analysis-section">
                    <h4>🔥 Emotional Intensity</h4>
                    <div class="intensity-bar">
                        <div class="intensity-label">Overall Dream Intensity</div>
                        <div class="intensity-meter">
                            <div class="intensity-fill" style="width: ${dream.intensity || 0}%;">
                                ${dream.intensity || 0}%
                            </div>
                        </div>
                    </div>
                </div>

                <div class="analysis-section">
                    <h4>🔮 Detected Symbols</h4>
                    <div class="symbols-list">
                        ${dream.symbols && dream.symbols.length > 0 
                            ? dream.symbols.map(s => `<span class="symbol-tag">${s}</span>`).join("")
                            : "No symbols detected"}
                    </div>
                </div>
            </div>
        `;

        dreamList.innerHTML += `
        <div class="dream">
            <h3>${dream.title}</h3>
            <p>${dream.description}</p>
            <div class="emotions-detected">
                ${emotionBadges}
            </div>
            <small>${dream.date}</small>
            <br>
            <button class="summary-btn" onclick="toggleSummary(${index})">
                ✨ Get AI Summary
            </button>
            <button class="analysis-btn" onclick="toggleAnalysis(${index})">
                📊 View Analysis
            </button>
            <div class="dream-summary" id="summary-${index}" style="display:none;"></div>
            ${analysisHTML}
        </div>
        `;
    });

    updateStats();
}

function updateStats(){

    document.getElementById("totalDreams")
    .innerText =
    "Total Dreams: " + dreams.length;

    // EMOTION STATS
    let allEmotionTotals = {};

    dreams.forEach(dream => {
        if (dream.emotions) {
            for (let emotion in dream.emotions) {
                allEmotionTotals[emotion] = (allEmotionTotals[emotion] || 0) + dream.emotions[emotion];
            }
        }
    });

    const sortedEmotions = Object.entries(allEmotionTotals)
        .sort((a, b) => b[1] - a[1]);

    let emotionStatsHTML = '';
    if (sortedEmotions.length > 0) {
        emotionStatsHTML += '<div class="emotion-stats">';
        sortedEmotions.forEach(([emotion, count]) => {
            emotionStatsHTML += `
                <div class="emotion-stat-item" style="border-left-color: var(--${emotion}-color);">
                    <span class="emotion-stat-label">${getEmotionIcon(emotion)} ${emotion.charAt(0).toUpperCase() + emotion.slice(1)}</span>
                    <span class="emotion-stat-count">${count}</span>
                </div>
            `;
        });
        emotionStatsHTML += '</div>';
    } else {
        emotionStatsHTML = '<p style="color:#999;">No emotions recorded yet.</p>';
    }

    document.getElementById("allEmotionStats").innerHTML = emotionStatsHTML;

    // THEME FREQUENCY TRACKING (Stage 1)
    const recurringThemes = detectRecurringThemes(dreams);
    
    let themeStatsHTML = '';
    if (recurringThemes.length > 0) {
        themeStatsHTML += '<div class="theme-stats">';
        recurringThemes.forEach(({theme, occurrences}) => {
            themeStatsHTML += `
                <div class="theme-stat-item">
                    <span class="theme-stat-label">📌 ${theme.charAt(0).toUpperCase() + theme.slice(1)}</span>
                    <span class="theme-stat-count">${occurrences} dreams</span>
                </div>
            `;
        });
        themeStatsHTML += '</div>';
    } else {
        themeStatsHTML = '<p style="color:#999;">Record dreams with themes to see recurring patterns.</p>';
    }

    document.getElementById("recurringThemesStats").innerHTML = themeStatsHTML;
}

renderDreams();

</script>
<script>
function saveDream() {
    const title = document.getElementById("title").value;
    const events = document.getElementById("recentEvents").value;
    const thoughts = document.getElementById("recentThoughts").value;
    const dream = document.getElementById("description").value;

    if (!dream) {
        showStatus("Please enter a dream.", "error");
        return;
    }

    const entry = {
        date: new Date().toISOString(),
        title: title,
        events: events,
        thoughts: thoughts,
        dream: dream
    };

    let dreams = JSON.parse(localStorage.getItem("dreams") || "[]");
    dreams.unshift(entry);
    localStorage.setItem("dreams", JSON.stringify(dreams));

    showStatus("Dream saved successfully!", "success");

    document.getElementById("title").value = "";
    document.getElementById("recentEvents").value = "";
    document.getElementById("recentThoughts").value = "";
    document.getElementById("description").value = "";
}

function showStatus(message, type) {
    const status = document.getElementById("status");
    status.textContent = message;
    status.className = "status-message " + type;
}
</script>
